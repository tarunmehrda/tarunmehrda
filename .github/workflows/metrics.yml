name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: [ "main", "master" ] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ── 1) Standalone 3D isometric calendar (full year) ─────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tarunmehrda
          filename: github-metrics-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── 2) BIG all-in-one infographic ───────────────────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tarunmehrda
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_animations: yes
          # IMPORTANT: if one plugin fails, skip it instead of failing the whole run
          plugins_errors_fatal: no

          # 🗣️ Languages (detailed + in-depth)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, makefile, jupyter-notebook
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 10
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_colors: github

          # ⏰ Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # 📰 Recent activity timeline
          plugin_activity: yes
          plugin_activity_limit: 7
          plugin_activity_days: 14
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes

          # 🌟 Notable contributions
          plugin_notable: yes
          plugin_notable_repositories: yes

          # 🏆 Achievements (detailed)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          # 🔁 Follow-up (issues / PRs)
          plugin_followup: yes
          plugin_followup_sections: repositories, user

          # 👥 People (followers / following)
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_types: followers, following

          # 📏 Lines of code changed
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4

          # 📌 Repositories
          plugin_repositories: yes
          plugin_repositories_pinned: 2
          plugin_repositories_order: featured, pinned, starred, random

          # 🏷️ Topics / technologies used
          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_sort: stars
          plugin_topics_limit: 12

          # 💻 A random snippet of code you wrote
          plugin_code: yes
          plugin_code_lines: 12

          # ⭐ Star history chart
          plugin_stargazers: yes
          plugin_stargazers_charts: yes

          # 🌠 Recently starred repos
          plugin_stars: yes
          plugin_stars_limit: 2
